<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Personal - UPAO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* ===== CSS MINIMIZADO Y UNIFICADO ===== */
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#F8FAFC;color:#1E293B;line-height:1.5;min-height:100vh;display:flex;flex-direction:column}
        
        /* HEADER COMPACTO */
        .app-header{background:#fff;border-bottom:1px solid #E2E8F0;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
        .logo{font-weight:700;font-size:15px;color:#1E293B;display:flex;align-items:center;gap:10px}
        .logo img{height:32px}
        .logo i{color:#3B82F6;font-size:20px}
        .main-nav{display:flex;gap:28px;align-items:center}
        .nav-link{text-decoration:none;color:#64748B;font-size:14px;font-weight:500;transition:color .2s;cursor:pointer;background:0;border:0;padding:4px 0;position:relative}
        .nav-link:hover{color:#3B82F6}
        .nav-link.active{color:#3B82F6}
        .nav-link.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:#3B82F6;border-radius:2px}
        .user-menu{width:36px;height:36px;background:#F1F5F9;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .user-menu i{color:#64748B;font-size:20px}

        /* MAIN CONTENT */
        .main-content{flex:1;padding:24px 32px;max-width:1400px;margin:0 auto;width:100%}
        .breadcrumbs{display:flex;align-items:center;gap:8px;margin-bottom:24px;font-size:13px;flex-wrap:wrap}
        .breadcrumbs a{text-decoration:none;color:#64748B;cursor:pointer;transition:color .2s}
        .breadcrumbs a:hover{color:#3B82F6}
        .breadcrumbs span{color:#94A3B8}
        .breadcrumbs .current{color:#1E293B;font-weight:500}
        
        .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;flex-wrap:wrap;gap:15px}
        .topbar h1{font-size:24px;font-weight:700}
        .topbar-actions{display:flex;gap:12px;flex-wrap:wrap}

        /* BOTONES */
        .btn{padding:10px 20px;border-radius:10px;border:0;font-weight:500;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;text-decoration:none;transition:all .2s}
        .btn-primary{background:#3B82F6;color:#fff}
        .btn-primary:hover{background:#2563EB;transform:translateY(-1px)}
        .btn-outline{background:0;color:#3B82F6;border:1px solid #3B82F6}
        .btn-outline:hover{background:#EFF6FF;transform:translateY(-1px)}
        .btn-success{background:#10B981;color:#fff}
        .btn-success:hover{background:#059669;transform:translateY(-1px)}
        .btn-purple{background:#8B5CF6;color:#fff}
        .btn-purple:hover{background:#7C3AED;transform:translateY(-1px)}
        .btn-secondary{background:#F1F5F9;color:#1E293B}
        .btn-secondary:hover{background:#E2E8F0}
        .btn-warning{background:#F59E0B;color:#fff}
        .btn-warning:hover{background:#D97706}
        .btn-danger{background:#EF4444;color:#fff}
        .btn-danger:hover{background:#DC2626}

        .total-badge{background:#EFF6FF;color:#3B82F6;padding:6px 16px;border-radius:20px;font-size:14px;font-weight:600;white-space:nowrap}
        .total-badge span{font-size:18px}

        /* DASHBOARD */
        .dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:30px}
        .dash-card{background:#fff;border-radius:16px;padding:20px;border:1px solid #E2E8F0;transition:transform .2s,box-shadow .2s}
        .dash-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.05)}
        .dash-card .card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
        .dash-card .card-header i{font-size:20px;color:#3B82F6;width:36px;height:36px;background:#EFF6FF;border-radius:10px;display:flex;align-items:center;justify-content:center}
        .dash-card .card-header h3{font-size:14px;font-weight:600;color:#64748B}
        .dash-card .number{font-size:32px;font-weight:700;color:#1E293B}
        .dash-card .sub-info{font-size:13px;color:#64748B;margin-top:6px}
        .dash-card .list-items{margin-top:10px;max-height:300px;overflow-y:auto}
        .dash-card .list-items .item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F1F5F9;font-size:14px}
        .dash-card .list-items .item:last-child{border-bottom:0}
        .dash-card .list-items .item .label{color:#1E293B;font-weight:500}
        .dash-card .list-items .item .value{color:#64748B;font-size:13px}
        .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600}
        .badge-blue{background:#EFF6FF;color:#3B82F6}
        .badge-green{background:#ECFDF5;color:#10B981}
        .badge-purple{background:#F5F3FF;color:#8B5CF6}
        .badge-orange{background:#FFF7ED;color:#F97316}
        .badge-pink{background:#FDF2F8;color:#EC4899}

        .contadores{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:#fff;border-radius:12px;border:1px solid #E2E8F0}
        .contador-item{font-size:14px;color:#64748B}
        .contador-item strong{color:#1E293B;font-size:18px}

        .action-bar{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
        .search-box{position:relative;flex:1;min-width:200px;max-width:400px}
        .search-box input{width:100%;padding:8px 12px 8px 34px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;background:#fff;transition:all .2s}
        .search-box input:focus{outline:0;border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
        .search-box i{position:absolute;left:10px;top:9px;color:#94A3B8;font-size:14px}

        /* TABLA */
        .table-container{background:#fff;border-radius:16px;border:1px solid #E2E8F0;overflow-x:auto}
        table{width:100%;border-collapse:collapse;min-width:700px}
        th{text-align:left;padding:12px 16px;background:#F8FAFC;font-weight:600;font-size:13px;color:#64748B;border-bottom:1px solid #E2E8F0}
        td{padding:10px 16px;border-bottom:1px solid #F1F5F9;font-size:14px}
        tr:last-child td{border-bottom:0}
        tr:hover td{background:#FAFBFC}
        .action-btn{width:32px;height:32px;border:0;background:0;border-radius:8px;cursor:pointer;font-size:16px;transition:background .2s}
        .action-btn:hover{background:#F1F5F9}
        .btn-view:hover{color:#10B981}
        .btn-edit:hover{color:#3B82F6}
        .btn-delete:hover{color:#EF4444}
        .btn-copy:hover{color:#8B5CF6}

        /* FORMULARIO */
        .form-container{background:#fff;border-radius:20px;border:1px solid #E2E8F0;padding:28px}
        .form-container h1{font-size:22px;font-weight:700;margin-bottom:4px}
        .subtitle{color:#64748B;font-size:14px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #E2E8F0}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;margin-bottom:24px}
        .form-group{display:flex;flex-direction:column;gap:4px}
        .form-group label{font-size:13px;font-weight:600;color:#64748B}
        .form-group label .required{color:#EF4444}
        .form-group input,.form-group select{padding:9px 12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;transition:all .2s;background:#fff;width:100%}
        .form-group input:focus,.form-group select:focus{outline:0;border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
        .section-title{grid-column:1/-1;font-size:15px;font-weight:700;color:#1E293B;margin-top:6px;margin-bottom:2px;padding-left:10px;border-left:3px solid #3B82F6}
        .button-group{display:flex;gap:12px;justify-content:flex-end;flex-wrap:wrap;padding-top:18px;border-top:1px solid #E2E8F0}
        .detail-field{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:10px;padding:8px 12px;font-size:14px;word-break:break-word}

        /* MODAL */
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px}
        .modal.active{display:flex}
        .modal-content{background:#fff;width:min(1000px,95%);max-height:90vh;overflow-y:auto;border-radius:20px;padding:28px}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #E2E8F0;flex-wrap:wrap;gap:10px}
        .modal-title{font-size:20px;font-weight:700}
        .close-btn{width:36px;height:36px;border:0;border-radius:10px;background:#F1F5F9;cursor:pointer;font-size:18px}
        .close-btn:hover{background:#E2E8F0}
        .modal-actions{display:flex;justify-content:flex-end;gap:12px;padding-top:18px;border-top:1px solid #E2E8F0;margin-top:4px;flex-wrap:wrap}

        .toast{position:fixed;bottom:24px;right:24px;background:#1E293B;color:#fff;padding:12px 20px;border-radius:12px;z-index:1100;opacity:0;transform:translateY(20px);transition:all .3s;max-width:380px;font-size:14px}
        .toast.show{opacity:1;transform:translateY(0)}
        .toast.success{background:#10B981}
        .toast.error{background:#EF4444}
        .toast.info{background:#3B82F6}

        .loading{display:none;text-align:center;padding:20px}
        .loading.active{display:block}
        .spinner{width:40px;height:40px;border:3px solid #E2E8F0;border-top-color:#3B82F6;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
        @keyframes spin{to{transform:rotate(360deg)}}
        .hidden{display:none!important}
        .text-center{text-align:center}
        .text-muted{color:#94A3B8}

        @media (max-width:768px){
            .app-header{padding:0 20px;height:auto;flex-wrap:wrap;padding:10px 20px;gap:6px}
            .logo{font-size:13px}
            .logo img{height:28px}
            .logo span{display:none}
            .main-nav{gap:12px;flex-wrap:wrap;order:3;width:100%;justify-content:center;padding-top:4px;border-top:1px solid #F1F5F9}
            .nav-link{font-size:12px;padding:4px 6px}
            .main-content{padding:14px 16px}
            .topbar{flex-direction:column;align-items:stretch;gap:10px}
            .topbar h1{font-size:20px}
            .dashboard-grid{grid-template-columns:1fr}
            .action-bar{flex-direction:column;align-items:stretch}
            .search-box{max-width:none}
            .contadores{flex-direction:column;gap:6px}
            .form-container{padding:16px}
            .form-grid{grid-template-columns:1fr}
            .button-group{justify-content:center}
            .modal-content{padding:16px}
            .toast{left:16px;right:16px;bottom:16px;max-width:none;text-align:center}
            table{min-width:360px;font-size:12px}
            th,td{padding:6px 8px;font-size:12px}
            .action-btn{width:24px;height:24px;font-size:12px}
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
    <div class="logo"><img src="logo.png" alt=""><span>OFICINA DE GESTIÓN DE LABORATORIOS</span></div>
    <nav class="main-nav">
        <a href="index.html" class="nav-link" id="navInicio">Inicio</a>
        <button class="nav-link active" id="navGestion" onclick="cambiarVista('listado')">Gestión Personal</button>
        <a href="#" class="nav-link">Documentos</a>
        <a href="#" class="nav-link">Noticias</a>
        <a href="#" class="nav-link">Contacto</a>
    </nav>
    <div class="user-menu"><i class="fas fa-user-circle"></i></div>
</header>

<!-- CONTENIDO PRINCIPAL -->
<main class="main-content" id="mainContent"></main>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- MODAL DETALLE -->
<div id="modalDetalle" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title"><i class="fas fa-id-card"></i> Detalle Completo</h2>
            <button class="close-btn" onclick="cerrarDetalle()">✕</button>
        </div>
        <div id="detalleContent" class="form-grid"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="cerrarDetalle()">Cerrar</button>
            <button class="btn btn-primary" onclick="editarDesdeDetalle()">✏️ Editar</button>
        </div>
    </div>
</div>

<script>
// ============================================================
//  CONFIGURACIÓN - CACHE OPTIMIZADA
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbw2U4jjLX4BoGeRQ9iiush5OSut8goZ3jCwNiiB4bRtW7zqtavEXnXcwOYTkpCoHXRd/exec';
const STORAGE_KEY = 'staffHubData';
const STORAGE_TIMESTAMP_KEY = 'staffHubTimestamp';
const CACHE_DURATION = 5 * 60 * 1000; // 5 minutos

// ============================================================
//  ESTADO GLOBAL
// ============================================================
let datos = [];
let datosFiltrados = null;
let vistaActual = 'listado';
let editMode = false;
let editCode = null;
let currentDetail = null;

// ============================================================
//  UTILIDADES
// ============================================================
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');

function toast(msg, type='success') {
    const t = $('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

function cerrarDetalle() {
    $('modalDetalle').classList.remove('active');
    currentDetail = null;
}

function copiarTexto(texto) {
    if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(texto).then(() => toast('📋 Copiado', 'success'))
            .catch(() => fallbackCopy(texto));
    } else fallbackCopy(texto);
}

function fallbackCopy(texto) {
    const ta = document.createElement('textarea');
    ta.value = texto;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); toast('📋 Copiado', 'success'); } catch(e) { toast('❌ Error', 'error'); }
    document.body.removeChild(ta);
}

function formatearFecha(f) {
    if(!f) return '';
    try { const d = new Date(f); if(isNaN(d)) return f; return d.toLocaleDateString('es-ES'); } catch(e){return f;}
}

// ============================================================
//  CARGA DE DATOS CON CACHE INTELIGENTE
// ============================================================
async function cargarDatos(force=false) {
    const loading = $('loadingListado') || $('loadingDash');
    if(loading) loading.classList.add('active');

    if(!force) {
        const cached = localStorage.getItem(STORAGE_KEY);
        const ts = localStorage.getItem(STORAGE_TIMESTAMP_KEY);
        if(cached && ts && (Date.now() - parseInt(ts) < CACHE_DURATION)) {
            try {
                datos = JSON.parse(cached);
                toast('📦 Caché', 'info');
                if(loading) loading.classList.remove('active');
                return datos;
            } catch(e) {}
        }
    }

    try {
        const resp = await fetch(API_URL + '?action=list');
        const texto = await resp.text();
        let result;
        try { result = JSON.parse(texto); } catch(e) { throw new Error('Respuesta no JSON'); }

        if(result.success && result.data) {
            datos = result.data;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(datos));
            localStorage.setItem(STORAGE_TIMESTAMP_KEY, String(Date.now()));
            toast('✅ Datos cargados', 'success');
            if(loading) loading.classList.remove('active');
            return datos;
        } else {
            toast('❌ ' + (result.message || 'Error'), 'error');
            if(loading) loading.classList.remove('active');
            return [];
        }
    } catch(e) {
        console.error(e);
        const fallback = localStorage.getItem(STORAGE_KEY);
        if(fallback) {
            try { datos = JSON.parse(fallback); toast('📦 Caché offline', 'info'); if(loading) loading.classList.remove('active'); return datos; } catch(e2){}
        }
        toast('❌ Error: ' + e.message, 'error');
        if(loading) loading.classList.remove('active');
        return [];
    }
}

// ============================================================
//  FILTRO DE BÚSQUEDA (Nombres, Apellido Paterno, ID)
// ============================================================
function buscarPersonal() {
    const busqueda = $('buscarDash')?.value.toLowerCase().trim() || '';

    if(!busqueda) {
        datosFiltrados = null;
        renderTabla(datos);
        actualizarContadores(datos);
        return;
    }

    datosFiltrados = datos.filter(item => {
        const texto = `${item.NOMBRES||''} ${item.APE_PATERNO||''} ${item.ID_PERSONAL||''}`.toLowerCase();
        return texto.includes(busqueda);
    });

    renderTabla(datosFiltrados);
    actualizarContadores(datosFiltrados);
}

// ============================================================
//  RENDER TABLA
// ============================================================
function renderTabla(data) {
    const tbody = $('tbodyListado');
    const total = $('totalPersonalListado');
    const filtrado = $('totalFiltrado');
    const mostrar = data || datos;
    if(total) total.textContent = mostrar.length;
    if(filtrado) filtrado.textContent = mostrar.length;
    if(!tbody) return;
    
    if(!mostrar || mostrar.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted" style="padding:24px;">Sin registros</td></tr>`;
        return;
    }

    tbody.innerHTML = mostrar.map(item => `
        <tr>
            <td>${esc(item.ID_PERSONAL)}</td>
            <td>${esc(item.APE_PATERNO)}</td>
            <td>${esc(item.APE_MATERNO)}</td>
            <td>${esc(item.NOMBRES)}</td>
            <td>
                <button class="action-btn btn-view" onclick='verDetalle(${JSON.stringify(item).replace(/'/g,"&#39;")})' title="Ver">👁️</button>
                <button class="action-btn btn-edit" onclick='editarRegistro(${JSON.stringify(item).replace(/'/g,"&#39;")})' title="Editar">✏️</button>
                <button class="action-btn btn-delete" onclick='eliminarRegistro("${esc(item.CODE)}")' title="Eliminar">🗑️</button>
                <button class="action-btn btn-copy" onclick='copiarDatos(${JSON.stringify(item).replace(/'/g,"&#39;")})' title="Copiar">📋</button>
            </td>
        </tr>
    `).join('');
}

function actualizarContadores(data) {
    const mostrar = data || datos;
    ['totalPersonalListado','totalFiltrado'].forEach(id => {
        const el = $(id); if(el) el.textContent = mostrar.length;
    });
}

// ============================================================
//  CRUD - ELIMINAR
// ============================================================
async function eliminarRegistro(code) {
    if(!confirm('⚠️ ¿Eliminar permanentemente?')) return;
    toast('Eliminando...', 'info');
    try {
        const resp = await fetch(API_URL + '?action=delete&code=' + encodeURIComponent(code));
        const texto = await resp.text();
        let result;
        try { result = JSON.parse(texto); } catch(e) { result = { success: texto.includes('success') }; }
        if(result.success) {
            toast('✅ Eliminado', 'success');
            datos = [];
            datosFiltrados = null;
            cambiarVista('listado');
        } else {
            toast('❌ ' + (result.message || 'Error'), 'error');
        }
    } catch(e) {
        toast('❌ ' + e.message, 'error');
    }
}

// ============================================================
//  CRUD - VER DETALLE
// ============================================================
function verDetalle(data) {
    currentDetail = data;
    const container = $('detalleContent');
    const campos = ['CODE','ID_PERSONAL','APE_PATERNO','APE_MATERNO','NOMBRES','FEC_NACIMIENTO','SEXO','DNI','TELEFONO','DIRECCION','EMAIL_PERSONAL','EMAIL_INSTITUCIONAL','EDUCACION_SUPERIOR','ESTADO_EDUCACION','PROFESION','PROGRAMA','CARGO','LUGAR_TRABAJO','TIPO_CONTRATO','TIPO_LABORATORIO','SCRUBS_PANTALON','SCRUBS_CHAQUETA','POLO_CAMISERO','Camisa','PANTALON'];
    container.innerHTML = campos.map(key => `
        <div class="form-group">
            <label>${key}</label>
            <div class="detail-field">${esc(data[key]||'')}</div>
        </div>
    `).join('');
    $('modalDetalle').classList.add('active');
}

function editarDesdeDetalle() {
    if(currentDetail) { editarRegistro(currentDetail); cerrarDetalle(); }
}

// ============================================================
//  CRUD - EDITAR
// ============================================================
function editarRegistro(data) {
    sessionStorage.setItem('editData', JSON.stringify(data));
    sessionStorage.setItem('editMode', 'true');
    cambiarVista('registro');
}

// ============================================================
//  COPIAR DATOS
// ============================================================
function copiarDatos(data) {
    const texto = `${data.NOMBRES||''} ${data.APE_PATERNO||''} ${data.APE_MATERNO||''} (Id: ${data.ID_PERSONAL||''})`;
    copiarTexto(texto);
}

function copiarFiltrados() {
    const data = datosFiltrados || datos;
    if(!data?.length) { toast('❌ Sin datos', 'error'); return; }
    const texto = data.map(item => `${item.NOMBRES||''} ${item.APE_PATERNO||''} ${item.APE_MATERNO||''} (Id: ${item.ID_PERSONAL||''})`).join('\n');
    copiarTexto(texto);
    toast(`📋 ${data.length} registros`, 'success');
}

// ============================================================
//  EXPORTAR CSV
// ============================================================
function exportarCSV() {
    const data = datosFiltrados || datos;
    if(!data?.length) { toast('⚠️ Sin datos', 'error'); return; }
    try {
        const headers = Object.keys(data[0]);
        let csv = '\uFEFF' + headers.join(',') + '\n';
        csv += data.map(item => headers.map(h => {
            let v = item[h]||'';
            if(typeof v === 'string') { v = v.replace(/"/g,'""'); if(v.includes(',')||v.includes('"')||v.includes('\n')) v = `"${v}"`; }
            return v;
        }).join(',')).join('\n');
        const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `personal_${new Date().toISOString().slice(0,10)}.csv`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
        toast(`📊 ${data.length} registros`, 'success');
    } catch(e) {
        toast('❌ ' + e.message, 'error');
    }
}

function actualizarDashboard() {
    const data = datos || [];
    if(!data.length) { document.querySelectorAll('.number').forEach(el => el.textContent='0'); return; }
    
    // Cumpleaños
    const mes = new Date().getMonth() + 1;
    const cumples = data.filter(item => {
        if(!item.FEC_NACIMIENTO) return false;
        try { const d = new Date(item.FEC_NACIMIENTO); if(!isNaN(d)) return d.getMonth()+1 === mes; } catch(e){}
        const f = String(item.FEC_NACIMIENTO);
        return f.includes('/'+String(mes).padStart(2,'0')+'/') || f.includes('/'+mes+'/');
    });
    $('cumpleanosMes').textContent = cumples.length;
    $('listaCumpleanos').innerHTML = cumples.length ? cumples.map(item => 
        `<div class="item"><span class="label">${esc(item.NOMBRES||'')} ${esc(item.APE_PATERNO||'')}</span><span class="value">${formatearFecha(item.FEC_NACIMIENTO)}</span></div>`
    ).join('') : '<div class="item"><span class="label" style="color:#94A3B8;">Sin cumpleaños</span></div>';

    // Género
    const gen = {h:0,m:0};
    data.forEach(item => {
        const s = String(item.SEXO||'').toUpperCase().trim();
        if(s === 'M' || s === 'MASCULINO' || s === 'MASC') gen.h++;
        else if(s === 'F' || s === 'FEMENINO' || s === 'FEM') gen.m++;
    });
    $('totalHombres').textContent = gen.h;
    $('totalMujeres').textContent = gen.m;
    $('totalGenero').textContent = gen.h + gen.m;
    $('badgeHombres').textContent = `Hombres: ${gen.h}`;
    $('badgeMujeres').textContent = `Mujeres: ${gen.m}`;

    // Educación
    const edu = {u:0,n:0,s:0};
    data.forEach(item => {
        const e = String(item.EDUCACION_SUPERIOR||'').toUpperCase().trim();
        if(e.includes('UNIVERSITARIA') || e.includes('MAESTRÍA') || e.includes('DOCTORADO')) edu.u++;
        else if(e.includes('TECNICA') || e.includes('TÉCNICA') || e.includes('NO UNIVERSITARIA')) edu.n++;
        else edu.s++;
    });
    $('educacionUniversitaria').textContent = edu.u;
    $('educacionNoUniversitaria').textContent = edu.n;
    $('educacionSinEspecificar').textContent = edu.s;
    $('badgeUniversitarios').textContent = `Universitarios: ${edu.u}`;

    // Cargos
    const car = {t1:0,t2:0,o:0};
    data.forEach(item => {
        const c = String(item.CARGO||'').toUpperCase().trim();
        if(c.includes('TÉCNICO DE LABORATORIO 1') || c.includes('TECNICO DE LABORATORIO 1')) car.t1++;
        else if(c.includes('TÉCNICO DE LABORATORIO 2') || c.includes('TECNICO DE LABORATORIO 2')) car.t2++;
        else if(c) car.o++;
    });
    $('tecnico1').textContent = car.t1;
    $('tecnico2').textContent = car.t2;
    $('otrosCargos').textContent = car.o;

    // Contratos
    const cont = {p:0,t:0,s:0};
    data.forEach(item => {
        const c = String(item.TIPO_CONTRATO||'').toUpperCase().trim();
        if(c.includes('PERMANENTE') || c.includes('FIJO') || c.includes('PLANILLA')) cont.p++;
        else if(c.includes('TEMPORAL') || c.includes('EVENTUAL') || c.includes('CAS') || c.includes('LOCACIÓN')) cont.t++;
        else cont.s++;
    });
    $('contratoPermanente').textContent = cont.p;
    $('contratoTemporal').textContent = cont.t;
    $('contratoSinEspecificar').textContent = cont.s;

    $('totalPersonalDash').textContent = data.length;
}

function obtenerDatosForm() {
    const campos = ['ID_PERSONAL','APE_PATERNO','APE_MATERNO','NOMBRES','FEC_NACIMIENTO','SEXO','DNI','TELEFONO','DIRECCION','EMAIL_PERSONAL','EDUCACION_SUPERIOR','ESTADO_EDUCACION','PROFESION','PROGRAMA','CARGO','LUGAR_TRABAJO','TIPO_CONTRATO','EMAIL_INSTITUCIONAL','SCRUBS_PANTALON','SCRUBS_CHAQUETA','POLO_CAMISERO','Camisa','PANTALON','TIPO_LABORATORIO'];
    const data = {};
    campos.forEach(c => { const el = $(c); if(el) data[c] = el.value || ''; });
    if(editMode && editCode) data.CODE = editCode;
    return data;
}

function validarRequeridos() {
    const req = ['ID_PERSONAL','APE_PATERNO','NOMBRES'];
    for(const r of req) {
        const el = $(r);
        if(!el || !el.value.trim()) {
            toast(`❌ ${r} es obligatorio`, 'error');
            if(el) el.focus();
            return false;
        }
    }
    return true;
}

async function guardarRegistro() {
    if(!validarRequeridos()) return;
    const loading = $('loadingReg');
    if(loading) loading.classList.add('active');
    const data = obtenerDatosForm();
    const action = editMode ? 'update' : 'create';
    let url = API_URL + '?action=' + action;
    if(editMode && editCode) url += '&code=' + encodeURIComponent(editCode);
    Object.entries(data).forEach(([k,v]) => { if(v) url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(v); });
    try {
        const resp = await fetch(url);
        const texto = await resp.text();
        let result;
        try { result = JSON.parse(texto); } catch(e) { result = { success: texto.includes('success') }; }
        if(result.success) {
            toast(editMode ? '✅ Actualizado' : '✅ Guardado', 'success');
            sessionStorage.removeItem('editData');
            sessionStorage.removeItem('editMode');
            setTimeout(async () => {
                datos = [];
                datosFiltrados = null;
                cambiarVista('listado');
            }, 1000);
        } else {
            toast('❌ ' + (result.message || 'Error'), 'error');
        }
    } catch(e) {
        toast('❌ ' + e.message, 'error');
    } finally {
        if(loading) loading.classList.remove('active');
    }
}
